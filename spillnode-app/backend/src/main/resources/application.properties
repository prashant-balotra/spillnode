# ==== Server ====
server.port=8080
server.servlet.context-path=/

# ==== Datasource (MySQL by default; override via env in Docker / prod) ====
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/spillnode?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==== JPA ====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==== JWT (override in production!) ====
app.jwt.secret=${JWT_SECRET:ZmFrZS1zZWNyZXQta2V5LWNvZGluZ2NydWlzZXItcmVwbGFjZS10aGlzLWluLXByb2QtMTIzNDU2Nzg5MA==}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ==== Admin Seed ====
app.admin.email=${ADMIN_EMAIL:admin@spillnode.com}
app.admin.password=${ADMIN_PASSWORD:Admin@123}
app.admin.name=${ADMIN_NAME:Spillnode Admin}

# ==== Sample posts seeding (set to false in prod after first run) ====
app.seed.sample-posts=${SEED_SAMPLE_POSTS:true}

# ==== YouTube ====
app.youtube.channel-id=${YOUTUBE_CHANNEL_ID:}
app.youtube.api-key=${YOUTUBE_API_KEY:}

# ==== CORS ====
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost}

# ==== Want to use H2 in-memory for local dev with zero MySQL setup? ====
# Activate dev profile: --spring.profiles.active=dev   (uses application-dev.properties)
