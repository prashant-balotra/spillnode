services:

  db:
    image: mysql:8.4
    container_name: spillnode-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-spillnode}
      MYSQL_USER: ${MYSQL_USER:-cruiser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-cruiser_pass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [cc-net]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spillnode-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-spillnode}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: ${MYSQL_USER:-cruiser}
      DB_PASSWORD: ${MYSQL_PASSWORD:-cruiser_pass}
      JWT_SECRET: ${JWT_SECRET:-ZmFrZS1zZWNyZXQta2V5LWNvZGluZ2NydWlzZXItcmVwbGFjZS10aGlzLWluLXByb2QtMTIzNDU2Nzg5MA==}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@spillnode.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
      ADMIN_NAME: ${ADMIN_NAME:-Spillnode Admin}
      SEED_SAMPLE_POSTS: "true"
      YOUTUBE_CHANNEL_ID: ${YOUTUBE_CHANNEL_ID:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      CORS_ALLOWED_ORIGINS: "http://localhost,http://localhost:80,http://localhost:4200"
    ports:
      - "8080:8080"
    networks: [cc-net]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spillnode-frontend
    restart: unless-stopped
    depends_on: [backend]
    ports:
      - "80:80"
    networks: [cc-net]

volumes:
  mysql_data:

networks:
  cc-net:
    driver: bridge
